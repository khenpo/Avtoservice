<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Новая заявка </title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-4 md:p-8">

    <div class="max-w-4xl mx-auto bg-white p-8 rounded-lg shadow-md">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-2xl font-bold text-gray-800">Ввод новой заявки</h1>
            <a href="/tasks" class="text-blue-600 hover:underline">← Назад к списку</a>
        </div>

        <form action="/create-request" method="POST" class="space-y-6">
            <!-- Секция Клиента -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700">Имя клиента *</label>
                    <input type="text" name="client_name" required class="mt-1 block w-full border border-gray-300 rounded-md p-2 shadow-sm focus:ring-blue-500 focus:border-blue-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Телефон</label>
                    <input type="text" name="phone_number" class="mt-1 block w-full border border-gray-300 rounded-md p-2 shadow-sm focus:ring-blue-500 focus:border-blue-500">
                </div>
                <!-- <div>
                    <label class="block text-sm font-medium text-gray-700">ID Telegram</label>
                    <input type="text" name="telegram_id" class="mt-1 block w-full border border-gray-300 rounded-md p-2 shadow-sm focus:ring-blue-500 focus:border-blue-500">
                </div> -->
            </div>

            <!-- Секция Автомобиля -->
            <div class="border-t pt-4 grid grid-cols-1 md:grid-cols-4 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700">Марка авто</label>
                    <input type="text" name="brand" class="mt-1 block w-full border border-gray-300 rounded-md p-2 shadow-sm focus:ring-blue-500 focus:border-blue-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Гос. номер</label>
                    <input type="text" name="license_plate" class="mt-1 block w-full border border-gray-300 rounded-md p-2 shadow-sm focus:ring-blue-500 focus:border-blue-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">VIN</label>
                    <input type="text" name="vin" class="mt-1 block w-full border border-gray-300 rounded-md p-2 shadow-sm focus:ring-blue-500 focus:border-blue-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Пробег</label>
                    <input type="number" name="mileage" class="mt-1 block w-full border border-gray-300 rounded-md p-2 shadow-sm focus:ring-blue-500 focus:border-blue-500">
                </div>
            </div>

            <!-- Детали заказа -->
            <div class="border-t pt-4 space-y-4">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="flex items-center space-x-3 bg-blue-50 p-3 rounded-md border border-blue-200">
                        <input type="checkbox" name="assign_now" id="assign_now" class="w-5 h-5 text-blue-600">
                        <label for="assign_now" class="text-sm font-medium text-blue-800 cursor-pointer">
                            Присвоить номер и принять в работу сразу
                        </label>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Начальный статус</label>
                        <select name="status" class="mt-1 block w-full border border-gray-300 rounded-md p-2 shadow-sm focus:ring-blue-500 focus:border-blue-500">
                            {% for id, name in statuses.items() %}
                            <option value="{{ id }}">{{ name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-700">Описание заявки *</label>
                    <textarea name="description" required rows="3" class="mt-1 block w-full border border-gray-300 rounded-md p-2 shadow-sm focus:ring-blue-500 focus:border-blue-500" placeholder="Что нужно сделать?"></textarea>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700">Примечание</label>
                    <textarea name="note" rows="2" class="mt-1 block w-full border border-gray-300 rounded-md p-2 shadow-sm focus:ring-blue-500 focus:border-blue-500"></textarea>
                </div>
            </div>

            <div class="flex justify-end pt-6">
                <button type="submit" class="bg-blue-600 text-white px-10 py-3 rounded-lg font-bold hover:bg-blue-700 shadow-lg transition">
                    Создать заявку
                </button>
            </div>
        </form>
    </div>

</body>
</html>
